name: Feature Request
description: Suggest an improvement to the Coolify deployment setup
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve this deployment configuration? We'd love to hear it.

        > **Note:** For feature requests related to Hermes Agent itself, please open an issue on the [upstream repo](https://github.com/NousResearch/hermes-agent/issues).

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Docker / Compose configuration
        - New messaging platform support
        - New LLM provider support
        - Documentation improvement
        - Environment variable / settings
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: Why is this useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Have you tried any workarounds?
    validations:
      required: false
