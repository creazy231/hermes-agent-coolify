name: Deployment Issue
description: Report a problem with building or deploying on Coolify
labels: ["bug", "deployment"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue! Please fill out the details below so we can help you quickly.

  - type: dropdown
    id: stage
    attributes:
      label: At what stage does the issue occur?
      options:
        - Docker build fails
        - Container starts but crashes
        - Container runs but bot doesn't respond
        - Environment variable / configuration issue
        - Other
    validations:
      required: true

  - type: input
    id: coolify-version
    attributes:
      label: Coolify version
      placeholder: e.g. v4.0.0-beta.374
    validations:
      required: true

  - type: input
    id: hermes-ref
    attributes:
      label: HERMES_REF value
      description: Which branch, tag, or commit hash are you building from?
      placeholder: main
    validations:
      required: false

  - type: dropdown
    id: llm-provider
    attributes:
      label: LLM Provider
      options:
        - OpenRouter
        - OpenAI-compatible (vLLM, Ollama, Together, Groq, etc.)
        - z.ai / ZhipuAI
        - Kimi / Moonshot
        - MiniMax
    validations:
      required: true

  - type: checkboxes
    id: platforms
    attributes:
      label: Messaging platforms configured
      options:
        - label: Telegram
        - label: Discord
        - label: Slack
        - label: WhatsApp
        - label: Signal
        - label: Home Assistant

  - type: textarea
    id: description
    attributes:
      label: Describe the issue
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or logs from the Coolify dashboard.
      render: shell
    validations:
      required: false

  - type: textarea
    id: compose-changes
    attributes:
      label: Changes to docker-compose.yml
      description: If you modified the compose file, paste the relevant changes here.
      render: yaml
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I am using the latest `docker-compose.yml` from this repo
          required: true
        - label: I have checked the [Troubleshooting](https://github.com/NousResearch/hermes-agent-coolify#-troubleshooting) section in the README
          required: true
        - label: This is a Coolify deployment issue, not an upstream Hermes Agent bug
          required: true
