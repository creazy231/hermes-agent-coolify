name: Platform Integration Issue
description: Report a problem with a specific messaging platform (Telegram, Discord, Slack, etc.)
labels: ["bug", "integration"]
body:
  - type: markdown
    attributes:
      value: |
        Having trouble with a specific messaging platform? Let us know the details.

  - type: dropdown
    id: platform
    attributes:
      label: Messaging platform
      options:
        - Telegram
        - Discord
        - Slack
        - WhatsApp
        - Signal
        - Home Assistant
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the issue
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: env-vars
    attributes:
      label: Environment variables set (redact secrets!)
      description: |
        List which platform-related env vars you have configured. **Do NOT paste actual tokens or keys** — just indicate which ones are set.
      placeholder: |
        TELEGRAM_BOT_TOKEN=<set>
        TELEGRAM_ALLOWED_USERS=123456789
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or logs from the Coolify dashboard.
      render: shell
    validations:
      required: false

  - type: input
    id: coolify-version
    attributes:
      label: Coolify version
      placeholder: e.g. v4.0.0-beta.374
    validations:
      required: false
